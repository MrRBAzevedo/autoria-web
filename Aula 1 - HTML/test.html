<!DOCTYPE html>

<html> 
    <head>
        <meta charset = "UTF-8">
        <title>Página teste</title>
    </head>
    <body>
        <h1>Bricando com tabelas</h1>

        <style>
            table {
                border-collapse: collapse;
                width: 20%;
            }
            th, td {
                border: 1px solid rgb(0, 0, 0);
                padding: 6px;
                text-align: center;
            }
            th {
                background-color: #f2f2f2;
            }
        </style>

        <table>
            <tr>
                <th>Dia</th>
                <th>Prova</th>
            </tr>
            <tr>
                <td>26/03</td>
                <td style = "text-align: center;">1.1</td>
            </tr>
            <tr>
                <td>25/04</td>
                <td style = "text-align: center;">1.2</td>
            </tr>
        </table>


    </body>

</html>
