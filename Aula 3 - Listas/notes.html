<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Atributo utilizado para ajustar o tamanho do site de acordo com o dispositivo.
        Como pode ser visto, width=device-width define que a largura do site deve ser igual a do dispositivo -->

        <title>Aula 3</title>

        <style>
            /* Style: Tag utilizada para definir estilos CSS dentro do código HTML 
            Apesar de funcionar, é preferível criar um arquivo CSS externo e importá-lo para o código*/

        </style>
    </head>
    <body>
        <h1>Aula 3 - Listas</h1>
        <h2>Resumo</h2>
            <p>Nessa aula, aprenderemos a fazer listas em HTML e veremos o início de CSS</p>
        <h2>Conteúdos</h2>
            <ol>
                <!-- OL (Ordened List): Tag utilizada para criar uma lista de itens que seguem um ordem (númerica, alfabética, de importância...) -->
                
                <li>Listas em HTML</li>
                <li>Início de CSS</li>
                <!-- LI (List Item): Tag utilizada para adicionar itens à lista
                OBS.: Essa deve ser a única tag utilizada dentro da lista. Caso queira inserir texto, pôr tag's de texto dentro das tag's IL -->
            
            </ol>
        <h2>Linguagens utilizadas</h2>
            <ul>
                <!-- UL (Unordened List): Tag utilizada para criar uma lista de itens que não seguem uma ordem -->

                <li>HTML</li>
                <li>CSS</li>

            </ul>
    </body>
</html>
