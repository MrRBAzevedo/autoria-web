<!DOCTYPE html>

<html lang="pt-br">
    <!-- Utiliza-se o atributo "lang" para definir a língua do site -->

    <head>        
        <meta name="" content="">
            <!-- meta: tag utilizada para adicionar atributos
                 name="": indica o tipo do atributo
                 content="": é a informação do atributo -->
        
        <meta name="UTF-8">
            <!-- Atribui o padrão de acentuação -->

        <meta name="keywords" content="IFRN, Cnat, Informática">
            <!-- Atribui palavras-chave que servirão de referência para o motor de busca do navegador -->

        <meta name="author" content="Renan">
            <!-- Indica o nome do autor do site -->

        <meta name="description" content="descrição do site...">
            <!-- Adiciona uma descrição ao site; geralmente aparece nos resultados de pesquisa -->
    </head>
    <body>
        <h1>Títulos</h1>
        <h2>Títulos</h2>
        <h3>Títulos</h3>
        <h4>Títulos</h4>
        <h5>Títulos</h5>
        <h6>Títulos</h6>
        <!-- Tag's utilizadas para estabelecer títulos -->

        <p>Texto</p>
        <!-- Tag utilizada para estabelecer parágrafos -->

        <hr>
        <!-- Horizontal rule: uma linha horizontal utilizada para separar a informação -->

    </body>
</html>
