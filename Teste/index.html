<!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Renazon</title>
    </head>
    <body>
        <div class="principal">
            <img src="Imagens/renazon.png" alt="Logomarca">
            <input type="search" placeholder="Digite sua pesquisa">
            <!-- A tag INPUT é utilizada para criar campos de texto
            o type search dessa tag indica que ela constitui uma caixa de pesquisa -->
        </div>
        <!-- A tag DIV cria blocos de conteúdos específicos, permetindo estruturar e personalizar a página de maneira mais prática -->

        <div class="secundario">
            <ol>
                <li>Venda na Renazon</li>
                <li>Continuar comprando</li>
                <li>Ofertas do dia</li>
            </ol>
        </div>
    </body>
</html>
